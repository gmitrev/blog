<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="shortcut icon" href="{{ "/favicon.ico" | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "/apple-touch-icon.png" | relative_url  }}">
    <link rel="icon" type="image/png" href="{{ "/favicon-16x16.png" | relative_url }}" sizes="16x16">
    <link rel="icon" type="image/png" href="{{ "/favicon-32x32.png" | relative_url }}" sizes="32x32">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600;700&display=swap">

    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <script async="" data-website-id="f7e00ced-3f46-4ba8-b750-9d8e8b0ef5eb" defer="" src="https://analytics.mitrev.net/umami.js" /></script>
  </head>
  <body class="bg-cream mx-8 lg:mx-auto lg:w-full lg:max-w-2xl flex flex-col h-screen">
    {% include header.html %}

    <main class="grow">
      {{ content }}
    </main>

    {% include footer.html %}

    <dialog id="lightbox" class="lightbox">
      <img alt="">
    </dialog>

    <script>
      // Poor man's lightbox
      (function () {
        const dialog = document.getElementById('lightbox');
        const img = dialog.querySelector('img');

        document.addEventListener('click', function (e) {
          const trigger = e.target.closest('.lightbox-trigger');
          if (!trigger) return;
          img.src = trigger.currentSrc || trigger.src;
          img.alt = trigger.alt;
          dialog.showModal();
        });

        dialog.addEventListener('click', function () { dialog.close(); });
      })();
    </script>
  </body>
</html>
